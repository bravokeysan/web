<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI-Dream RAG Issues Cards</title>
    <style>
      :root {
        --bg: #f5f1e8;
        --bg-accent: #efe4d3;
        --surface: rgba(255, 252, 247, 0.92);
        --surface-strong: #fffaf2;
        --text: #2f241b;
        --muted: #6a5a49;
        --line: rgba(92, 68, 44, 0.12);
        --brand: #9d4edd;
        --brand-soft: rgba(157, 78, 221, 0.12);
        --shadow: 0 18px 48px rgba(72, 47, 28, 0.10);
        --radius: 22px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.65), transparent 28%),
          linear-gradient(180deg, var(--bg-accent), var(--bg));
      }

      .page {
        width: min(100%, 960px);
        margin: 0 auto;
        padding: 20px 14px 40px;
      }

      .hero {
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.92), rgba(255, 245, 230, 0.84)),
          var(--surface);
        box-shadow: var(--shadow);
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        background: var(--brand-soft);
        color: var(--brand);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
      }

      h1 {
        margin: 14px 0 10px;
        font-size: clamp(28px, 7vw, 44px);
        line-height: 1.05;
      }

      .lead {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.7;
      }

      .toolbar {
        margin-top: 16px;
        display: grid;
        gap: 10px;
      }

      .search,
      .filter {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 14px 16px;
        background: var(--surface-strong);
        color: var(--text);
        font-size: 16px;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 14px;
      }

      .meta-chip {
        padding: 10px 12px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.74);
        border: 1px solid var(--line);
        font-size: 13px;
        color: var(--muted);
      }

      .grid {
        margin-top: 18px;
        display: grid;
        gap: 14px;
      }

      .card {
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface);
        box-shadow: var(--shadow);
        backdrop-filter: blur(10px);
      }

      .card-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
      }

      .issue-no {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 58px;
        padding: 8px 10px;
        border-radius: 14px;
        background: var(--brand);
        color: #fff;
        font-size: 13px;
        font-weight: 800;
      }

      .card-title {
        margin: 12px 0 8px;
        font-size: 18px;
        line-height: 1.5;
      }

      .card-summary {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.8;
      }

      .deleted {
        background: rgba(120, 88, 60, 0.08);
      }

      .deleted .issue-no {
        background: #8a6b52;
      }

      .empty {
        display: none;
        margin-top: 18px;
        padding: 18px;
        border-radius: 20px;
        border: 1px dashed var(--line);
        text-align: center;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.55);
      }

      @media (min-width: 720px) {
        .page {
          padding: 28px 20px 56px;
        }

        .toolbar {
          grid-template-columns: 1.6fr 1fr;
        }

        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <div class="eyebrow">AI-Dream RAG / GitHub Issues</div>
        <h1>スマホで見やすい<br>Issueカード一覧</h1>
        <p class="lead">
          Open Issue の要約をカード型で見やすく整理しました。番号、和訳タイトル、少し詳しめの要約を、片手でも追いやすいレイアウトで表示します。
        </p>
        <div class="toolbar">
          <input id="search" class="search" type="search" placeholder="番号・タイトル・要約で検索">
          <select id="filter" class="filter" aria-label="表示フィルタ">
            <option value="all">すべて表示</option>
            <option value="active">通常 Issue のみ</option>
            <option value="deleted">削除番号のみ</option>
          </select>
        </div>
        <div class="meta">
          <div class="meta-chip" id="countChip">読み込み中...</div>
          <div class="meta-chip">表示対象: Open Issues 要約</div>
        </div>
      </section>

      <section id="grid" class="grid" aria-live="polite"></section>
      <div id="empty" class="empty">条件に合う Issue がありません。</div>
    </main>

    <script>
      const issues = [
        {
          "number": "1",
          "title": "PubMedメタデータ取得用の scripts/fetch_paper.py を実装する",
          "summary": "PubMed URL または PMID を入力として受け取り、タイトル・著者・年・抄録などの基本メタデータを取得し、後続処理で使える JSON として保存する最初の取得ステップを実装する。"
        },
        {
          "number": "2",
          "title": "AI-Dream 論文スキーマ正規化用の scripts/normalize_paper.py を実装する",
          "summary": "fetch 済み JSON を AI-Dream 用の共通スキーマへ整形し、authors・keywords・candidate_folders などを固定キーで保持した normalized JSON を出力できるようにする。"
        },
        {
          "number": "3",
          "title": "AI-Dream Markdown カード生成用の scripts/generate_card.py を実装する",
          "summary": "normalized JSON から front matter 付きの KB 用 Markdown カードを生成し、研究デザイン・主要結果・検索フックを含む一定構造で `kb/<folder>/` に保存できるようにする。"
        },
        {
          "number": "4",
          "title": "KnowledgeBase 台帳更新用の scripts/update_registry.py を実装する",
          "summary": "生成済み Markdown または normalized JSON をもとに registry CSV の1行を作成し、重複判定しながら追記・更新できる台帳更新スクリプトを整備する。"
        },
        {
          "number": "5",
          "title": "paper-intake 用の Issue ルーティング GitHub Actions workflow を実装する",
          "summary": "GitHub Issue を起点に `paper-intake` ラベルを検知し、Issue の title・body・labels を取得してログ出力し、今後の自動処理へつなげる最小 workflow を作る。"
        },
        {
          "number": "6",
          "title": "paper-intake workflow から scripts/fetch_paper.py を実行する",
          "summary": "paper-intake 系 GitHub Actions から `scripts/fetch_paper.py` を呼び出し、Issue 由来の PubMed URL や PMID を使って文献メタデータ取得まで自動化する。"
        },
        {
          "number": "7",
          "title": "paper-intake workflow から scripts/normalize_paper.py を実行する",
          "summary": "paper-intake workflow に正規化ステップを追加し、取得済みデータを共通スキーマの normalized JSON に変換して後続処理へ渡せるようにする。"
        },
        {
          "number": "8",
          "title": "paper-intake workflow から scripts/generate_card.py を実行する",
          "summary": "paper-intake workflow の中で Markdown カード生成を行い、取得・正規化された論文情報から AI-Dream 用カードを自動出力できるようにする。"
        },
        {
          "number": "9",
          "title": "paper-intake workflow から scripts/update_registry.py を実行する",
          "summary": "paper-intake workflow の最後に registry 更新を組み込み、新規カード生成後に台帳へ自動反映できるようにする。"
        },
        {
          "number": "10",
          "title": "paper-intake workflow の結果を GitHub Issue にコメントで返す",
          "summary": "paper-intake 実行後に、成功・失敗・生成物の場所などを Issue コメントで返し、Actions ログを開かなくても結果を確認できるようにする。"
        },
        {
          "number": "11",
          "title": "paper-intake workflow 完了後に自動で Pull Request を作成する",
          "summary": "paper-intake によって生じた KB や registry の変更を自動で Pull Request 化し、人手を介さずレビュー工程へ渡せるようにする。"
        },
        {
          "number": "12",
          "title": "kb-rewrite 用の Issue ルーティング GitHub Actions workflow を実装する",
          "summary": "kb-rewrite ラベル付き Issue をトリガーに、対象ファイルや修正目的を取得して後続の KB 改稿処理へ渡す専用 workflow を整備する。"
        },
        {
          "number": "13",
          "title": "kb-rewrite workflow から KB 書き換え処理を実行する",
          "summary": "kb-rewrite workflow から実際の Markdown 再構成処理を実行し、既存 KB カードの本文改善や構成調整を自動化できるようにする。"
        },
        {
          "number": "14",
          "title": "kb-rewrite workflow の結果を GitHub Issue にコメントで返す",
          "summary": "kb-rewrite 実行後に、更新対象ファイル・変更概要・成否を Issue コメントで返し、修正結果を Issue 上で追跡できるようにする。"
        },
        {
          "number": "15",
          "title": "kb-rewrite workflow 完了後に自動で Pull Request を作成する",
          "summary": "kb-rewrite による Markdown 修正を自動で Pull Request 化し、レビューやマージ前確認をしやすくする。"
        },
        {
          "number": "16",
          "title": "retrieval-test 用の Issue ルーティング GitHub Actions workflow を実装する",
          "summary": "retrieval-test ラベル付き Issue を受けて、クエリ評価系の処理へ分岐するための GitHub Actions workflow を用意する。"
        },
        {
          "number": "17",
          "title": "retrieval-test workflow から検索評価スクリプトを実行する",
          "summary": "retrieval-test workflow から評価スクリプトを呼び出し、クエリ・期待ヒット・評価結果の生成までを自動実行できるようにする。"
        },
        {
          "number": "18",
          "title": "retrieval-test workflow の結果を GitHub Issue にコメントで返す",
          "summary": "retrieval-test の評価結果を Issue コメントへ投稿し、期待との差分や主要なヒット状況を Issue 上で確認できるようにする。"
        },
        {
          "number": "19",
          "title": "retrieval-test workflow 完了後に自動で Pull Request を作成する",
          "summary": "retrieval-test 実行で更新された評価結果や関連ファイルを自動で Pull Request 化し、変更をレビューしやすくする。"
        },
        {
          "number": "20",
          "title": "retrieval-test workflow を実際の Dify 検索バックエンドに接続する",
          "summary": "retrieval-test をモックではなく実際の Dify retrieval backend に接続し、実運用に近い検索評価を GitHub Actions から実行できるようにする。"
        },
        {
          "number": "21",
          "title": "Codex と Issue ベースのルーティングを統合する",
          "summary": "Issue routing の判定結果を Codex 利用フローと結び付け、Issue 種別に応じて人間が毎回説明しなくても次の作業へ進みやすい仕組みを整える。"
        },
        {
          "number": "22",
          "title": "AI-Dream RAG workflows 向けの issue routing 補助スクリプトを実装する",
          "summary": "Issue の title・body・labels を解析して `paper-intake` などの issue_type を判定する `scripts/route_issue.py` を実装し、ルーティングの基盤を作る。"
        },
        {
          "number": "23",
          "title": "GitHub Actions から scripts/route_issue.py を呼び出してルーティング結果を公開する",
          "summary": "GitHub Actions 上で `route_issue.py` を実行し、その JSON 出力を後続 step や workflow が参照できる形で露出させる。"
        },
        {
          "number": "24",
          "title": "Issue ルーティング結果を GitHub Issue にコメントで返す",
          "summary": "`route_issue.py` の判定結果を GitHub Issue にコメント投稿し、issue_type・判定根拠・次のアクション候補を Issue 上で見える化する。"
        },
        {
          "number": "25",
          "title": "Issue ルーティング結果を Codex に渡して作業実行へつなげる",
          "summary": "routing 結果をファイルや構造化テキストとして保存し、Codex がそのまま参照して `paper-intake` など適切な作業へ進める受け渡し方式を定義する。"
        },
        {
          "number": "26",
          "title": "unknown と判定された Issue の確認フローを定義する",
          "summary": "分類不能な `unknown` Issue について、自動処理を止めたまま人間確認・ラベル追加・本文修正依頼へ安全に回すための確認フローを文書化する。"
        },
        {
          "number": "27",
          "title": "issue_type に応じて Issue 処理を正しい workflow に振り分ける",
          "summary": "route_issue.py の判定結果を受けて、`paper-intake`・`kb-rewrite`・`retrieval-test`・`prompt-update` の適切な workflow へ自動分岐し、`unknown` は停止する制御を作る。"
        },
        {
          "number": "28",
          "title": "Issue ルーティング結果と workflow 結果を GitHub Project ステータスに同期する",
          "summary": "Issue routing 後や workflow 実行後の状態を GitHub Project の `Status` フィールドへ反映し、Project ボード上でも進行状況を追えるようにする。"
        },
        {
          "number": "29",
          "title": "Issue ルーティング結果を GitHub Issue にコメントで返す（タイトル不完全）",
          "summary": "最新取得では `#29` は Open のままで、タイトルはコメント返却系だが本文は GitHub Project status 同期を扱っており、タイトルと内容に不整合があるため整理が必要。"
        },
        {
          "number": "30",
          "title": "Issue ベース運用向けの Codex 標準ハンドオフプロンプトを定義する",
          "summary": "issue_type や workflow 状態をもとに Codex へ渡す定型プロンプト群を整備し、依頼内容・制約・完了条件を毎回ぶれずに引き継げるようにする。"
        },
        {
          "number": "31",
          "title": "Issue ベース workflow を AI-Dream RAG 向けの reusable workflow に再構成する",
          "summary": "paper-intake・kb-rewrite・retrieval-test・prompt-update を再利用しやすい reusable workflow に切り出し、入力・出力・secrets をそろえて保守しやすくする。"
        },
        {
          "number": "32",
          "title": "Issue ルーティングと workflow 結果に基づく安全な再実行制御を実装する",
          "summary": "Issue の編集やラベル変更、失敗後の再試行に対して、意味のある差分がある時だけ rerun を許可するなど、安全な再実行ルールを整備する。"
        },
        {
          "number": "33",
          "title": "GitHub Project ステータス更新失敗時のフォールバック戦略を定義する",
          "summary": "GitHub Project の `Status` 更新だけが失敗した場合に本体処理全体を failure にしないよう、fallback 条件・警告ログ・Issue コメント方針を定める。"
        },
        {
          "number": "34",
          "title": "ルーティング済み Issue データから Codex ハンドオフ文を半自動生成する方法を検討する",
          "summary": "routing 結果や Issue 情報から Codex へ渡す依頼文を半自動で生成できるようにし、テンプレート運用の手間をさらに減らす方針を検討する。"
        },
        {
          "number": "35",
          "title": "コメント投稿・PR 作成・ステータス更新の共通処理を reusable workflow 部品へ切り出す",
          "summary": "各 workflow に重複しやすい Issue コメント投稿、PR 作成、Project status 更新などの後処理を共通コンポーネントとして再利用できるように整理する。"
        },
        {
          "number": "36",
          "title": "再実行判定制御のための state snapshot スクリプトを実装する",
          "summary": "Issue 実行時点の title・body・labels・routing 結果などを保存する snapshot スクリプトを作り、後続の rerun 判定で比較できる状態を作る。"
        },
        {
          "number": "37",
          "title": "最新保存 state と比較して rerun 可否を判定するスクリプトを実装する",
          "summary": "保存済み snapshot と現在の Issue 情報を比較し、意味のある変更があるかどうかを判定して rerun 実行・skip を判断するスクリプトを実装する。"
        },
        {
          "number": "38",
          "title": "最新の Issue 状態から GitHub Project ステータスを再同期する専用 workflow を実装する",
          "summary": "Issue の最新状態をもとに GitHub Project の Status だけを後から再同期できる専用 workflow を作り、status 更新失敗時の復旧手段を用意する。"
        }
      ];

      const grid = document.getElementById("grid");
      const empty = document.getElementById("empty");
      const search = document.getElementById("search");
      const filter = document.getElementById("filter");
      const countChip = document.getElementById("countChip");

      function render() {
        const q = search.value.trim().toLowerCase();
        const mode = filter.value;

        const filtered = issues.filter((issue) => {
          const isDeleted = issue.title === "削除";
          if (mode === "active" && isDeleted) return false;
          if (mode === "deleted" && !isDeleted) return false;

          const haystack = `${issue.number} ${issue.title} ${issue.summary}`.toLowerCase();
          return haystack.includes(q);
        });

        grid.innerHTML = filtered.map((issue) => {
          const deletedClass = issue.title === "削除" ? " deleted" : "";
          return `
            <article class="card${deletedClass}">
              <div class="card-head">
                <span class="issue-no">#${issue.number}</span>
              </div>
              <h2 class="card-title">${escapeHtml(issue.title)}</h2>
              <p class="card-summary">${escapeHtml(issue.summary)}</p>
            </article>
          `;
        }).join("");

        empty.style.display = filtered.length ? "none" : "block";
        countChip.textContent = `${filtered.length}件表示 / 全${issues.length}件`;
      }

      function escapeHtml(text) {
        return text
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll("\"", "&quot;")
          .replaceAll("'", "&#39;");
      }

      search.addEventListener("input", render);
      filter.addEventListener("change", render);
      render();
    </script>
  </body>
</html>
